server {
        root /opt/pdm/website;
        index index.html;

        server_name enedis.openstreetmap.fr;
        gzip on;
        gzip_proxied any;
        gzip_types application/x-protobuf application/json application/javascript;

        location / {
                proxy_pass http://localhost:3000;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_cache_bypass $http_upgrade;
        }

        location /tiles {
                if ($uri ~ "/tiles/[0-6]/") {
                        expires 2h;
                }
                if ($uri ~ "/tiles/[7-9]/") {
                        expires 1h;
                }
                if ($uri ~ "/tiles/(10|11|12|13|14|15|16)/") {
                        expires 20m;
                }
                proxy_pass http://127.0.0.1:8082/maps;
        }

        location /extracts {
                root /data/files/pdm;
                autoindex off;
        }

        location ~ \.json$ {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/enedis.openstreetmap.fr/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/enedis.openstreetmap.fr/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = enedis.openstreetmap.fr) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


        listen 80;
	listen [::]:80;

        server_name enedis.openstreetmap.fr;
    return 404; # managed by Certbot


}
server {
    listen 80;
    listen [::]:80;
    server_name enedis.infos-reseaux.com;
    rewrite ^/(.*)$ https://enedis.openstreetmap.fr redirect;
}